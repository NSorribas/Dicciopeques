<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario — Léxico</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1a14;
            --bg-surface: #162019;
            --bg-card: #1c2a22;
            --fg: #e8e0d4;
            --fg-muted: #9a9285;
            --accent: #d4a843;
            --accent-dim: rgba(212, 168, 67, 0.15);
            --accent-glow: rgba(212, 168, 67, 0.3);
            --green: #4a8c6f;
            --green-dim: rgba(74, 140, 111, 0.15);
            --red: #c45c5c;
            --border: rgba(212, 168, 67, 0.12);
            --card-shadow: 0 4px 24px rgba(0,0,0,0.3);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === FONDO ATMOSFÉRICO === */
        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-atmosphere .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            will-change: transform;
            transform: translateZ(0);
            animation: blobFloat 20s ease-in-out infinite alternate;
        }

        .bg-atmosphere .blob:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-glow);
            top: -10%; left: -10%;
        }

        .bg-atmosphere .blob:nth-child(2) {
            width: 400px; height: 400px;
            background: rgba(74, 140, 111, 0.2);
            bottom: -10%; right: -5%;
            animation-delay: -7s;
        }

        .bg-atmosphere .blob:nth-child(3) {
            width: 300px; height: 300px;
            background: rgba(212, 168, 67, 0.12);
            top: 40%; left: 50%;
            animation-delay: -14s;
        }

        @keyframes blobFloat {
            0% { transform: translateZ(0) translate(0, 0) scale(1); }
            33% { transform: translateZ(0) translate(30px, -40px) scale(1.1); }
            66% { transform: translateZ(0) translate(-20px, 20px) scale(0.95); }
            100% { transform: translateZ(0) translate(10px, -10px) scale(1.05); }
        }

        /* === LAYOUT PRINCIPAL === */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* === HEADER === */
        header {
            padding: 60px 0 40px;
            text-align: center;
            position: relative;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), #b8912e);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg);
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }

        .logo-icon:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .logo-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--fg), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            font-size: 15px;
            color: var(--fg-muted);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 28px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--fg-muted);
        }

        .stat-item .stat-num {
            font-weight: 700;
            color: var(--accent);
            font-size: 18px;
        }

        /* === BARRA DE BÚSQUEDA === */
        .search-section {
            margin-bottom: 32px;
            position: relative;
        }

        .search-wrapper {
            position: relative;
            max-width: 640px;
            margin: 0 auto;
        }

        .search-wrapper i.search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-muted);
            font-size: 18px;
            transition: color 0.3s;
        }

        .search-input {
            width: 100%;
            padding: 18px 52px 18px 52px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 60px;
            color: var(--fg);
            font-size: 17px;
            font-family: 'Source Sans 3', sans-serif;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--fg-muted);
            font-weight: 300;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-dim), var(--card-shadow);
        }

        .search-input:focus ~ i.search-icon {
            color: var(--accent);
        }

        .search-clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--fg-muted);
            font-size: 16px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
            padding: 6px;
        }

        .search-clear.visible {
            opacity: 1;
        }

        .search-clear:hover {
            color: var(--accent);
        }

        /* === FILTROS POR CATEGORÍA === */
        .filters-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 36px;
        }

        .filter-chip {
            padding: 7px 18px;
            border-radius: 30px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--fg-muted);
            font-size: 13px;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: capitalize;
        }

        .filter-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .filter-chip.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .filter-chip .chip-count {
            display: inline-block;
            margin-left: 6px;
            font-size: 11px;
            opacity: 0.7;
        }

        /* === LISTADO DE RESULTADOS === */
        .results-info {
            font-size: 13px;
            color: var(--fg-muted);
            margin-bottom: 16px;
            padding-left: 4px;
            min-height: 20px;
        }

        .results-info strong {
            color: var(--accent);
        }

        .word-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 80px;
        }

        /* === TARJETA DE PALABRA — SIN animación de entrada === */
        .word-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            cursor: pointer;
            transition: border-color 0.3s ease, transform 0.25s ease, box-shadow 0.3s ease, background 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .word-card:hover {
            border-color: var(--accent-glow);
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
        }

        .word-card:hover::before {
            opacity: 1;
        }

        .word-card.expanded {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-card), rgba(212,168,67,0.04));
        }

        .word-card.expanded::before {
            opacity: 1;
        }

        .word-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .word-main {
            flex: 1;
        }

        .word-term {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 4px;
            transition: color 0.3s;
        }

        .word-card:hover .word-term {
            color: var(--accent);
        }

        .word-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .word-category {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cat-sustantivo { background: rgba(74,140,111,0.2); color: #6bc49a; }
        .cat-verbo { background: rgba(212,168,67,0.2); color: #d4a843; }
        .cat-adjetivo { background: rgba(180,100,160,0.2); color: #c88ab8; }
        .cat-adverbio { background: rgba(100,160,200,0.2); color: #7cc0e0; }
        .cat-expresion { background: rgba(200,120,80,0.2); color: #d49a6a; }
        .cat-conjugacion { background: rgba(160,140,100,0.2); color: #b8a878; }

        .word-syllables {
            font-size: 13px;
            color: var(--fg-muted);
            font-style: italic;
        }

        .word-pronunciation {
            font-size: 13px;
            color: var(--fg-muted);
            font-family: monospace;
        }

        .word-expand-icon {
            color: var(--fg-muted);
            font-size: 14px;
            transition: transform 0.3s, color 0.3s;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .word-card.expanded .word-expand-icon {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* Detalle expandido */
        .word-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .word-card.expanded .word-detail {
            max-height: 600px;
            opacity: 1;
        }

        .word-detail-inner {
            padding-top: 20px;
            border-top: 1px solid var(--border);
            margin-top: 16px;
        }

        .definition-block {
            margin-bottom: 16px;
        }

        .definition-block:last-child {
            margin-bottom: 0;
        }

        .def-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            margin-right: 8px;
            vertical-align: middle;
        }

        .def-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--fg);
        }

        .def-example {
            margin-top: 8px;
            padding-left: 30px;
            font-size: 14px;
            color: var(--fg-muted);
            font-style: italic;
            line-height: 1.5;
            border-left: 2px solid var(--green-dim);
        }

        .def-example::before {
            content: '\201C';
            color: var(--green);
        }

        .def-example::after {
            content: '\201D';
            color: var(--green);
        }

        .synonyms-block {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }

        .synonyms-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fg-muted);
            margin-bottom: 8px;
        }

        .synonym-tag {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            background: var(--green-dim);
            color: var(--green);
            font-size: 13px;
            margin: 2px 4px 2px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .synonym-tag:hover {
            background: rgba(74,140,111,0.3);
            transform: translateY(-1px);
        }

        .origin-block {
            margin-top: 12px;
            font-size: 13px;
            color: var(--fg-muted);
        }

        .origin-block strong {
            color: var(--fg);
        }

        /* === PALABRA DEL DÍA === */
        .word-of-day {
            background: linear-gradient(135deg, var(--bg-card), rgba(212,168,67,0.06));
            border: 1.5px solid var(--accent-glow);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 36px;
            position: relative;
            overflow: hidden;
        }

        .word-of-day::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-dim), transparent 70%);
            pointer-events: none;
        }

        .wod-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .wod-label i {
            font-size: 14px;
        }

        .wod-term {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 900;
            color: var(--fg);
            margin-bottom: 6px;
        }

        .wod-def {
            font-size: 17px;
            line-height: 1.6;
            color: var(--fg-muted);
            max-width: 560px;
        }

        .wod-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }

        /* === ESTADO VACÍO === */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--fg-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* === TOAST === */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--accent-glow);
            border-radius: 10px;
            color: var(--fg);
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast i {
            color: var(--accent);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* === FOOTER === */
        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 13px;
            color: var(--fg-muted);
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* === SCROLL BAR === */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212,168,67,0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212,168,67,0.4);
        }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            header { padding: 40px 0 24px; }
            .logo-title { font-size: 34px; }
            .search-input { padding: 15px 48px 15px 48px; font-size: 15px; }
            .word-card { padding: 18px 20px; }
            .word-term { font-size: 22px; }
            .wod-term { font-size: 30px; }
            .word-of-day { padding: 24px; }
            .header-stats { gap: 20px; }
        }

        /* === REDUCCIÓN DE MOVIMIENTO === */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo atmosférico -->
    <div class="bg-atmosphere" aria-hidden="true">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="app-container">

        <!-- Cabecera -->
        <header>
            <div class="logo-mark">
                <div class="logo-icon"><i class="fas fa-book-open"></i></div>
                <h1 class="logo-title">Léxico</h1>
            </div>
            <p class="logo-subtitle">Diccionario en línea</p>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-num" id="totalWords">0</span> palabras
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="totalCats">0</span> categorías
                </div>
            </div>
        </header>

        <!-- Palabra del día -->
        <section class="word-of-day" id="wordOfDay" aria-label="Palabra del día"></section>

        <!-- Búsqueda -->
        <section class="search-section" aria-label="Búsqueda">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="Buscar palabra, definición o sinónimo..."
                    autocomplete="off"
                    aria-label="Buscar palabra"
                >
                <button class="search-clear" id="searchClear" aria-label="Limpiar búsqueda">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </section>

        <!-- Filtros -->
        <nav class="filters-bar" id="filtersBar" aria-label="Filtrar por categoría"></nav>

        <!-- Info de resultados -->
        <div class="results-info" id="resultsInfo"></div>

        <!-- Listado de palabras -->
        <main class="word-list" id="wordList" role="list"></main>

        <footer>
            Proyecto Léxico &mdash; Datos incluidos en el archivo, sin servidor externo
        </footer>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // BASE DE DATOS
        // ============================================================
        const DICCIONARIO = [
            {
                palabra: "alboroto",
                categoria: "sustantivo",
                silabas: "al-bo-ro-to",
                pronunciacion: "/al.boˈɾo.to/",
                origen: "Del español alborotar, de origen onomatopéyico",
                definiciones: [
                    { texto: "Ruido, vocería o confusión de muchas personas.", ejemplo: "El alboroto en la plaza despertó a todo el vecindario." },
                    { texto: "Perturbación o alteración del orden público.", ejemplo: "Varios detenidos por el alboroto en la manifestación." }
                ],
                sinonimos: ["bullicio", "estrépito", "vocerío", "tumulto", "revuelo"]
            },
            {
                palabra: "atardecer",
                categoria: "verbo",
                silabas: "ar-ta-rde-cer",
                pronunciacion: "/aɾ.taɾ.ðeˈθeɾ/",
                origen: "Del latín ad tardescere, 'hacerse tarde'",
                definiciones: [
                    { texto: "Dicho del día: ir acabándose, ir cayendo la tarde.", ejemplo: "Nos sentamos en la terraza a atardecer." },
                    { texto: "Llegar la tarde o el ocaso.", ejemplo: "Atardecía cuando por fin llegamos al pueblo." }
                ],
                sinonimos: ["ocasentar", "anochecer", "caer la tarde"]
            },
            {
                palabra: "melancolía",
                categoria: "sustantivo",
                silabas: "me-lan-co-lí-a",
                pronunciacion: "/me.laŋ.koˈli.a/",
                origen: "Del griego melancholía, 'bilis negra'",
                definiciones: [
                    { texto: "Tristeza vaga, profunda y permanente, que no tiene causa concreta.", ejemplo: "Una melancolía dulce la invadía al escuchar esa canción." },
                    { texto: "En medicina antigua, uno de los cuatro humores del cuerpo.", ejemplo: "La melancolía era considerada un exceso de bilis negra." }
                ],
                sinonimos: ["tristeza", "nostalgia", "pena", "desconsuelo", "abatimiento"]
            },
            {
                palabra: "efímero",
                categoria: "adjetivo",
                silabas: "e-fí-me-ro",
                pronunciacion: "/eˈfi.me.ɾo/",
                origen: "Del griego ephemeros, 'que dura un día'",
                definiciones: [
                    { texto: "Que dura muy poco tiempo, pasajero, transitorio.", ejemplo: "La fama es efímera si no se cultiva con trabajo." },
                    { texto: "En biología, dicho de un organismo: que vive muy poco tiempo.", ejemplo: "Las efímeras son insectos cuya vida adulta dura apenas horas." }
                ],
                sinonimos: ["pasajero", "transitorio", "fugaz", "breve", "temporal"]
            },
            {
                palabra: "vehemencia",
                categoria: "sustantivo",
                silabas: "ve-he-men-cia",
                pronunciacion: "/be.eˈmen.θja/",
                origen: "Del latín vehementia",
                definiciones: [
                    { texto: "Cualidad de vehemente; impetuosidad, furor, violencia en el modo de actuar o hablar.", ejemplo: "Defendió sus ideas con vehemencia ante el tribunal." },
                    { texto: "Intensidad grande de un sentimiento o pasión.", ejemplo: "La vehemencia de su amor la conducía a decisiones temerarias." }
                ],
                sinonimos: ["impetuosidad", "furia", "ardor", "pasión", "ímpetu"]
            },
            {
                palabra: "desvelar",

            const cats = {};
            DICCIONARIO.forEach(p => {
                cats[p.categoria] = (cats[p.categoria] || 0) + 1;
            });
            return cats;
        }

        function filtrarPalabras() {
            return DICCIONARIO.filter(p => {
                const coincideCategoria = filtroActual === "todas" || p.categoria === filtroActual;
                if (!coincideCategoria) return false;
                if (!terminoBusqueda) return true;
                const q = terminoBusqueda.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const campos = [
                    p.palabra, p.categoria,
                    ...p.definiciones.map(d => d.texto),
                    ...p.sinonimos, p.origen || ""
                ].map(c => c.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
                return campos.some(c => c.includes(q));
            });
        }

        function resaltar(texto, query) {
            if (!query) return texto;
            const normalized = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const q = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return texto.replace(regex, '<mark style="background:var(--accent-dim);color:var(--accent);border-radius:3px;padding:0 2px;">$1</mark>');
        }

        function renderFiltros() {
            const cats = getCategorias();
            const bar = document.getElementById("filtersBar");
            const categoriasOrdenadas = Object.entries(cats).sort((a, b) => b[1] - a[1]);

            let html = `<button class="filter-chip ${filtroActual === 'todas' ? 'active' : ''}" data-cat="todas">
                Todas <span class="chip-count">${DICCIONARIO.length}</span>
            </button>`;

            categoriasOrdenadas.forEach(([cat, count]) => {
                html += `<button class="filter-chip ${filtroActual === cat ? 'active' : ''}" data-cat="${cat}">
                    ${cat} <span class="chip-count">${count}</span>
                </button>`;
            });

            bar.innerHTML = html;

            bar.querySelectorAll(".filter-chip").forEach(chip => {
                chip.addEventListener("click", () => {
                    filtroActual = chip.dataset.cat;
                    tarjetaExpandida = null;
                    renderFiltros();
                    renderLista();
                });
            });
        }

        // ============================================================
        // NÚCLEO: renderLista
        // ============================================================
        function renderLista(forzar = false) {
            const lista = document.getElementById("wordList");
            const info = document.getElementById("resultsInfo");
            const resultados = filtrarPalabras();

            // Clave para detectar cambios reales
            const nuevaKey = resultados.map(p => p.palabra).join("|") + "|" + terminoBusqueda + "|" + filtroActual;
            const contenidoCambio = nuevaKey !== ultimoResultadoKey;
            ultimoResultadoKey = nuevaKey;

            // Info de resultados
            if (terminoBusqueda || filtroActual !== "todas") {
                info.innerHTML = `<strong>${resultados.length}</strong> resultado${resultados.length !== 1 ? 's' : ''} encontrado${resultados.length !== 1 ? 's' : ''}`;
            } else {
                info.innerHTML = `Mostrando las <strong>${resultados.length}</strong> palabras del diccionario`;
            }

            if (resultados.length === 0) {
                lista.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>No se encontraron palabras que coincidan con tu búsqueda.</p>
                    </div>`;
                return;
            }

            // Solo reconstruir el DOM si el contenido realmente cambió
            if (contenidoCambio || forzar) {
                lista.innerHTML = resultados.map((p) => {
                    const expandida = tarjetaExpandida === p.palabra;
                    const catClass = `cat-${p.categoria}`;
                    return `
                    <article class="word-card ${expandida ? 'expanded' : ''}"
                        data-palabra="${p.palabra}"
                        role="listitem"
                        aria-expanded="${expandida}">
                        <div class="word-header">
                            <div class="word-main">
                                <h2 class="word-term">${resaltar(p.palabra, terminoBusqueda)}</h2>
                                <div class="word-meta">
                                    <span class="word-category ${catClass}">${p.categoria}</span>
                                    <span class="word-syllables">${p.silabas}</span>
                                    <span class="word-pronunciation">${p.pronunciacion}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-down word-expand-icon"></i>
                        </div>
                        <div class="word-detail">
                            <div class="word-detail-inner">
                                ${p.definiciones.map((d, di) => `
                                    <div class="definition-block">
                                        <p class="def-text">
                                            ${p.definiciones.length > 1 ? `<span class="def-number">${di + 1}</span>` : ''}
                                            ${resaltar(d.texto, terminoBusqueda)}
                                        </p>
                                        ${d.ejemplo ? `<p class="def-example">${resaltar(d.ejemplo, terminoBusqueda)}</p>` : ''}
                                    </div>
                                `).join('')}
                                ${p.sinonimos.length ? `
                                    <div class="synonyms-block">
                                        <div class="synonyms-label">Sinónimos</div>
                                        ${p.sinonimos.map(s => `<span class="synonym-tag" data-synonym="${s}">${resaltar(s, terminoBusqueda)}</span>`).join('')}
                                    </div>
                                ` : ''}
                                ${p.origen ? `
                                    <div class="origin-block"><strong>Etimología:</strong> ${p.origen}</div>
                                ` : ''}
                            </div>
                        </div>
                    </article>`;
                }).join('');

                bindCardEvents();
            } else {
                // Solo actualizar expansión sin tocar el DOM
                lista.querySelectorAll(".word-card").forEach(card => {
                    const palabra = card.dataset.palabra;
                    const debeExpandir = tarjetaExpandida === palabra;
                    card.classList.toggle("expanded", debeExpandir);
                    card.setAttribute("aria-expanded", debeExpandir);
                });
            }

            // Estadísticas
            document.getElementById("totalWords").textContent = DICCIONARIO.length;
            document.getElementById("totalCats").textContent = Object.keys(getCategorias()).length;
        }

        // ============================================================
        // Eventos de tarjetas
        // ============================================================
        function bindCardEvents() {
            const lista = document.getElementById("wordList");

            lista.querySelectorAll(".word-card").forEach(card => {
                card.addEventListener("click", (e) => {
                    const synonymTag = e.target.closest(".synonym-tag");
                    if (synonymTag) {
                        e.stopPropagation();
                        const syn = synonymTag.dataset.synonym;
                        document.getElementById("searchInput").value = syn;
                        terminoBusqueda = syn;
                        document.getElementById("searchClear").classList.add("visible");
                        tarjetaExpandida = null;
                        renderLista(true);
                        mostrarToast(`Buscando: "${syn}"`);
                        return;
                    }

                    const palabra = card.dataset.palabra;
                    if (tarjetaExpandida === palabra) {
                        tarjetaExpandida = null;
                    } else {
                        tarjetaExpandida = palabra;
                    }
                    lista.querySelectorAll(".word-card").forEach(c => {
                        const esLaTarjeta = c.dataset.palabra === tarjetaExpandida;
                        c.classList.toggle("expanded", esLaTarjeta);
                        c.setAttribute("aria-expanded", esLaTarjeta);
                    });
                });
            });
        }

        function renderPalabraDelDia() {
            const hoy = new Date();
            const indice = (hoy.getFullYear() * 366 + hoy.getMonth() * 31 + hoy.getDate()) % DICCIONARIO.length;
            const p = DICCIONARIO[indice];
            document.getElementById("wordOfDay").innerHTML = `
                <div class="wod-label"><i class="fas fa-star"></i> Palabra del día</div>
                <h2 class="wod-term">${p.palabra}</h2>
                <p class="wod-def">${p.definiciones[0].texto}</p>
                <div class="wod-footer">
                    <span class="word-category cat-${p.categoria}">${p.categoria}</span>
                    <span style="font-size:13px;color:var(--fg-muted)">${p.pronunciacion}</span>
                </div>
            `;
        }

        function mostrarToast(mensaje) {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<i class="fas fa-search"></i> ${mensaje}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.addEventListener("DOMContentLoaded", () => {
            renderPalabraDelDia();
            renderFiltros();
            renderLista();

            const searchInput = document.getElementById("searchInput");
            const searchClear = document.getElementById("searchClear");

            // Búsqueda con debounce de 150ms para evitar re-renders por cada tecla
            searchInput.addEventListener("input", () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    terminoBusqueda = searchInput.value.trim();
                    searchClear.classList.toggle("visible", terminoBusqueda.length > 0);
                    tarjetaExpandida = null;
                    renderLista();
                }, 150);
            });

            searchClear.addEventListener("click", () => {
                clearTimeout(debounceTimer);
                searchInput.value = "";
                terminoBusqueda = "";
                searchClear.classList.remove("visible");
                tarjetaExpandida = null;
                renderLista(true);
                searchInput.focus();
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "/" && document.activeElement !== searchInput) {
                    e.preventDefault();
                    searchInput.focus();
                }
                if (e.key === "Escape" && document.activeElement === searchInput) {
                    searchInput.blur();
                }
            });
        });
    </script>
</body>
</html>
