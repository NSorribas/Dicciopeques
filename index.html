<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiccioPeques</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- Fondo atmosférico -->
    <div class="bg-atmosphere" aria-hidden="true">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="app-container">

        <!-- Cabecera -->
        <header>
            <div class="logo-mark">
                <div class="logo-icon"><i class="fas fa-book-open"></i></div>
                <h1 class="logo-title">DiccioPeques</h1>
            </div>
            <p class="logo-subtitle">Diccionario de palabras</p>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-num" id="totalWords">0</span> palabras
                </div>
            </div>
        </header>

        <!-- Búsqueda -->
        <section class="search-section" aria-label="Búsqueda">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="Buscar palabra, definición o sinónimo..."
                    autocomplete="off"
                    aria-label="Buscar palabra"
                >
                <button class="search-clear" id="searchClear" aria-label="Limpiar búsqueda">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </section>

        <!-- Navegación A-Z -->
        <nav class="az-nav" id="azNav" aria-label="Navegación alfabética"></nav>

        <!-- Palabra del día -->
        <section class="word-of-day" id="wordOfDay" aria-label="Palabra del día"></section>

        <!-- Separador decorativo -->
        <div class="separator" aria-hidden="true">
            <img src="assets/separator.svg" alt="" loading="lazy">
        </div>

        <!-- Info de resultados -->
        <div class="results-info" id="resultsInfo"></div>

        <!-- Listado de palabras -->
        <main class="word-list" id="wordList" role="list"></main>

        <footer>
            Proyecto Léxico &mdash; Datos incluidos en el archivo, sin servidor externo
        </footer>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/app.js"></script>
</body>
</html>
