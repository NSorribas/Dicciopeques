name: Palabra del Día — Notificación Push

on:
  workflow_dispatch:
    inputs:
      custom_title:
        description: 'Título personalizado (vacío = palabra del día)'
        required: false
        default: ''
      custom_body:
        description: 'Mensaje personalizado (vacío = palabra del día automático)'
        required: false
        default: ''

jobs:
  send-daily-word:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install web-push

      - name: Enviar notificación push
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CUSTOM_TITLE: ${{ github.event.inputs.custom_title }}
          CUSTOM_BODY: ${{ github.event.inputs.custom_body }}
        run: node .github/scripts/send-push.js
